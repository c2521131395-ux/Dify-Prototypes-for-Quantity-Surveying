        prompt_template:
        - id: 764b759b-53c9-40f6-8410-8508435a954c
          role: system
          text: "System:\n\nYou are a title extract agent. You will receive a markdown\
            \ of a pdf document and a section title list. Find the section title of\
            \ the pdf document and record the file name. The section title must match\
            \ in the section title list. If the markdown includes more than one title\
            \ in the section title list, prioritize the first title the markdown explicitly\
            \ mentions.\n\nOutput must be valid JSON only.\nUser:\nGiven the first\
            \ page text of a section PDF, extract the section title as it appears,\
            \ and then record the file name.\nIf a section title ends with '.0' (for\
            \ example, '3.0 ABC'), this is the cover page of that section. On the\
            \ section's first page include only the title text after the number (here\
            \ 'ABC') and no other content.\n\nRules:\nOutput JSON with keys: \"file_id\"\
            , \"extracted_title\" and \"evidence\".\n\"evidence\" must be a short\
            \ exact excerpt from the text that shows the title.\nIf you cannot find\
            \ a clear title, set extracted_title to \"null\" and explain in evidence.\n\
            \nOutput as JSON in this format:\n  {\n    \"file_id\": \"...\",\n   \
            \ \"first_page_text\": \"...\",\n    \"extracted_title\": \"...\",\n \
            \   \"evidence\": \"...\"\n  }\n/\nProcessed pdf document: {{#1772287503357.item#}}\n\
            Section title list: {{#1772287150945.text#}}\n"
        retry_config:
          max_retries: 3
          retry_enabled: true
          retry_interval: 1000

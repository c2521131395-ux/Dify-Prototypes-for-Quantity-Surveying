          role: system
          text: "System:\nYou perform record linkage between TOC titles and section\
            \ PDFs. Output JSON only.\nUser:\nMatch each TOC title to exactly one\
            \ section PDF using the extracted first-page titles.\nInputs:\nTOC TITLES\
            \ (ordered):\n{{#1772287150945.text#}}\nSECTION DOCS:\n{{#1772287503357.output#}}\n\
            \nRules:\nUse extracted_title as primary matching field.\nEnforce one-to-one\
            \ assignment (no section file used more than once).\nIf any TOC title\

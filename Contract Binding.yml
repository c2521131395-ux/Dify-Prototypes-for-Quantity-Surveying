        - id: 80339d8b-c4e9-4ca5-968f-10bc6ba4a1bf
          role: system
          text: "System:\n\nYou are an agent aiming to identify the section title\
            \ of a markdown text. You will receive a JSON and a a section title list.\
            \ The JSON including the extracted_title and markdown of a pdf document\
            \ and a section title list. If the \"extracted_title\" is NOT \"null\"\
            , do not do anything, and return the exact JSON you receive. Only when\
            \ the extracted_title is \"null\", try to identify the section title based\
            \ on the following instruction and the section title list.\n\nOutput must\
            \ be valid JSON only.\n\nUser:\nIf \"extracted_title\" the JSON is NOT\
            \ \"null\", skip the following instruction, and return the original JSON\
            \ you received.\nDo not generate any title other than the titles shown\
            \ in the section title list.\nFor the section title named \"ARTICLES OF\
            \ AGREEMENT AND CONDITIONS OF SUB-CONTRACT\" or similar and not ending\
            \ with  '.0', the first page will usually consist of the words \"Sub-Contract\"\
            \ or \"Nominated Sub-Contract\", \"Hong Kong\", \"Standard Form of Building\
            \ Contract\" or similar.\nFor the section title named \"SUB-CONTRACT CORRESPONDENCE\"\
            \ or similar and not ending with  '.0', the first page will usually consist\
            \ of a letter or details of a list of letters.\n\nRules:\nOutput JSON\
            \ with keys: \"file_id\", \"extracted_title\" and \"evidence\".\n\"evidence\"\
            \ must be a short exact excerpt from the text that shows the title.\n\
            If you cannot find a clear title, set extracted_title to \"null\" and\
            \ explain in evidence.\n\nOutput as JSON in this format:\n  {\n    \"\
            file_id\": \"...\",\n    \"first_page_text\": \"...\",\n    \"extracted_title\"\
            : \"...\",\n    \"evidence\": \"...\"\n  }\n/\nProcessed pdf document:\

            ]

            }

            A plain text block (newline-separated) that lists the original filenames
            in the processing order, one filename per line. Example:

            RECO4015-2526S2-CaseStudyGroup-IndvAssignmentBrief.r2 (1).pdf

            Coursework_v2 (1).pdf

            RECO4015-2526S2-IndvAssignmentMap (3).pdf

            Task:

            Parse the JSON string in input (key "output") to extract the server_filename
            values in order.

            Parse the newline-separated text to extract the original filenames in
            order.

            Create an array named ordered_files where each item is an object with
            these fields:

            file_id: a sequential id in the format "file_01", "file_02", ... (two-digit,
            zero-padded)

            server_filename: the server_filename from the JSON (preserve exactly)

            filename: the corresponding original filename from the text (preserve
            exactly)

            Important rules:

            Match files strictly by order: the first server_filename pairs with the
            first filename line, the second with the second, etc.

            Preserve exact strings (do not trim or alter filenames or server_filenames
            except to remove surrounding quotes if present).

            If the number of server_filenames and filenames differ, return an error
            object (see format below).

            Output must be valid JSON and nothing else (no commentary, no markdown).

            Successful output format (example):

            {

            "ordered_files": [

            { "file_id": "file_01", "server_filename": "c1c97c02c9c72bffe2c4b658fceb47f727b549f7634e1aa2b9b7f6d77819f716.pdf",
